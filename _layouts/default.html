<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <h1><a href="/">{{ site.title }}</a></h1>
            <p>{{ site.description }}</p>
        </header>
        
        <section>
            <h2>{{ page.title }}</h2>
            {{ content }}
        </section>
        
        <footer>
            <p>Powered by GitHub Pages</p>
        </footer>
    </div>
</body>
</html>
